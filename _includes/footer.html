<ul class="social-links">
  {% if site.social.twitter %}
  <li><a href="https://twitter.com/{{ site.social.twitter }}" target="_blank">Twitter</a></li>
  {% endif %}
  {% if site.social.github %}
  <li><a href="https://github.com/{{ site.social.github }}" target="_blank">GitHub</a></li>
  {% endif %}
  {% if site.social.stackoverflow %}
  <li><a href="https://stackoverflow.com/{{ site.social.stackoverflow }}" target="_blank">Stack Overflow</a></li>
  {% endif %}
</ul>
